<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Site</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 3rem;
      line-height: 1.6;
      color: #e5e7eb;
      background: #0b0f19;
    }

    header {
      margin-bottom: 2rem;
    }

    .timestamp,
    .update-log {
      background: rgba(255, 255, 255, 0.06);
      padding: 1rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      max-width: 35rem;
    }

    .timestamp p,
    .update-log p {
      margin: 0.25rem 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    a {
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My First Site</h1>
    <p>This page shows timestamps so you can verify your updates are reaching it.</p>
  </header>

  <section class="timestamp">
    <h2>Current update timestamps</h2>
    <p><strong>Page loaded:</strong> <span id="pageLoaded"></span></p>
    <p><strong>File last modified:</strong> <span id="fileModified"></span></p>
  </section>

  <section class="update-log">
    <h2>Update log (test)</h2>
    <p>Last test update: <span id="updateTest"></span></p>
    <p>Make a change to this file and refresh to see this timestamp update.</p>
  </section>

  <script>
    const now = new Date();
    const formattedNow = now.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'medium' });

    document.getElementById('pageLoaded').textContent = formattedNow;
    document.getElementById('updateTest').textContent = formattedNow;

    // document.lastModified may not always be reliable depending on server setup, but it gives a quick approximation.
    const lastMod = document.lastModified;
    document.getElementById('fileModified').textContent = lastMod || 'N/A';
  </script>
</body>
</html>
